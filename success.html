<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Thank you — LocalQuill</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', sans-serif;
            background: #080808;
            color: #f2f2f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #888;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .key-label {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .key-box {
            background: #0a0a0a;
            border: 1px solid #2e2e2e;
            border-radius: 10px;
            padding: 16px;
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            color: #d4f57a;
            letter-spacing: 2px;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: #d4f57a;
            color: #080808;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Geist', sans-serif;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #b8e050;
        }

        .steps {
            text-align: left;
            background: #0a0a0a;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .step {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-num {
            color: #d4f57a;
            font-family: 'DM Mono', monospace;
            flex-shrink: 0;
        }

        .email-note {
            font-size: 12px;
            color: #555;
            font-family: 'DM Mono', monospace;
        }

        .no-key {
            color: #ff5f5f;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h1>You're in!</h1>
        <p class="sub">Thank you for buying LocalQuill. Here's your license key — save it somewhere safe.</p>

        <div id="keySection">
            <div class="key-label">Your License Key</div>
            <div class="key-box" id="licenseKeyDisplay">Loading...</div>
            <button class="copy-btn" id="copyBtn" onclick="copyKey()">Copy License Key</button>
        </div>

        <div class="steps">
            <div class="step"><span class="step-num">1</span> Open LocalQuill in Chrome</div>
            <div class="step"><span class="step-num">2</span> Go to Settings tab</div>
            <div class="step"><span class="step-num">3</span> Paste your license key and click Activate</div>
            <div class="step"><span class="step-num">4</span> Start writing ✍️</div>
        </div>

        <p class="email-note">📧 Key also sent to your email by Dodo Payments</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const key = params.get("license_key");
        const display = document.getElementById("licenseKeyDisplay");

        if (key) {
            display.textContent = key;
        } else {
            display.innerHTML = '<span class="no-key">Key not found — check your email</span>';
            document.getElementById("copyBtn").style.display = "none";
        }

        function copyKey() {
            const key = document.getElementById("licenseKeyDisplay").textContent;
            navigator.clipboard.writeText(key);
            document.getElementById("copyBtn").textContent = "✓ Copied!";
            setTimeout(() => document.getElementById("copyBtn").textContent = "Copy License Key", 2000);
        }
    </script>
</body>

</html>
